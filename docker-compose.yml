services:
  app:
    image: flask_app:latest
    container_name: flask_app
    restart: unless-stopped
    build:
      context: .
    environment:
      DB_HOST: mysql
      DB_NAME: flask
      DB_USER: flask
      DB_PASSWORD: password
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5001:5000"

  mysql:
    container_name: mysql
    image: mysql
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/mysqld.cnf:/etc/mysql/mysql.conf.d/mysqld.cnf
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: flask
      MYSQL_USER: flask
      MYSQL_PASSWORD: password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flask", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  testserver:
    image: test:latest
    container_name: testserver
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      - app
      - mysql

volumes:
  mysql-data:
    driver: local
