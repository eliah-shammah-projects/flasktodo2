# trigger workflow
name: CI Pipeline
on:
  push:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: docker compose up -d --build

      - name: Show running containers
        run: docker ps

      - name: Run integration test (inside docker network)
        run: docker compose run --rm testserver

      # --- CD (Deploy para Docker Hub) só se testes DEREM CERTO ---
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image para Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/flasktodo2:latest

      # --- Shutdown sempre (mantendo o if: always()) ---
      - name: Shutdown containers
        if: always()
        run: docker compose down

      # --- Copiar arquivos para EC2 ---
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx,db"
          target: "/home/ec2-user/app/"

      # --- Deploy no EC2 ---
      - name: Deploy no EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop flasktodo2 mysql nginx || true
            docker rm flasktodo2 mysql nginx || true
            cd ~/app
            export GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            docker compose pull app nginx
            docker compose up -d app mysql nginx
