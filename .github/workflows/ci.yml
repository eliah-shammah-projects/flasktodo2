# trigger workflow
name: CI Pipeline
on:
  push:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: docker compose up -d --build

      - name: Show running containers
        run: docker ps

      - name: Run integration test (inside docker network)
        run: docker compose run --rm testserver

      # --- CD (Deploy para Docker Hub) só se testes DEREM CERTO ---
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image para Docker Hub
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/flasktodo2:latest .

      - name: Push Docker image para Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/flasktodo2:latest

      # --- Shutdown sempre (mantendo o if: always()) ---
      - name: Shutdown containers
        if: always()
        run: docker compose down

      # --- Deploy no EC2 ---
      - name: Deploy no EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker network create app-network || true
            docker start mysql 2>/dev/null || docker run -d \
              --name mysql \
              --network app-network \
              -e MYSQL_ROOT_PASSWORD=password \
              -e MYSQL_DATABASE=flask \
              -e MYSQL_USER=flask \
              -e MYSQL_PASSWORD=password \
              -v mysql-data:/var/lib/mysql \
              --restart unless-stopped \
              mysql
            sleep 15
            docker stop flasktodo2 || true
            docker rm flasktodo2 || true
            docker pull eliahushammah/flasktodo2:latest
            docker run -d \
              --name flasktodo2 \
              --network app-network \
              -e DB_HOST=mysql \
              -e DB_NAME=flask \
              -e DB_USER=flask \
              -e DB_PASSWORD=password \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              -p 80:5000 \
              --restart unless-stopped \
              eliahushammah/flasktodo2:latest
